name: Yahoo News Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # 1時間ごと

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: |
          pip install feedparser pandas openpyxl

      - name: スクリプト実行
        run: python script.py

      - name: 変更をコミット
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add newsDB.xlsx
          git commit -m "update news" || echo "no changes"
          git push
